name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    timeout-minutes: 15
    # Run the platform-independent unit suites on Windows too. The point of the
    # tmpdir() fixtures is that these suites carry no POSIX-only filesystem
    # dependency; the only way to keep that true is to exercise them on native
    # Windows in CI. The bash-stub integration suites skipIf(win32), so the
    # Windows leg runs exactly the suites this gate protects. fail-fast: false
    # so a Windows-only regression does not mask the ubuntu result, and vice versa.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bunx @biomejs/biome lint --error-on-warnings .

      - name: Test
        run: bun test
